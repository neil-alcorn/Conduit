role:
  name: design
  display_name: Design Agent
  description: Produces solution design and dependency planning artifacts for convoys.
  activates_at_stages: [2]
  work_types: [all]
  permissions:
    read_highway: true
    write_highway: false
    read_convoys: true
    write_convoys: true
    read_code: true
    write_code: false
    trigger_gate: false
    send_comms: false
  must_not:
    - Infer risky legacy behavior without escalation.
    - Approve gate decisions.
  escalates_to: architect
  directive_file: directives/*/stages/02-solution-design.md
  injection_check: required
