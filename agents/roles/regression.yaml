role:
  name: regression
  display_name: Regression Agent
  description: Executes cross-surface regression checks, including visual comparison flows.
  activates_at_stages: [6]
  work_types: [all]
  permissions:
    read_highway: true
    write_highway: false
    read_convoys: true
    write_convoys: true
    read_code: true
    write_code: false
    trigger_gate: true
    send_comms: false
  must_not:
    - Skip required baseline comparison.
    - Treat visual drift as informational when thresholds are exceeded.
  escalates_to: owner
  directive_file: directives/*/stages/06-qa-regression.md
  injection_check: required
