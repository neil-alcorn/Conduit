role:
  name: qa
  display_name: QA Agent
  description: Runs deterministic QA and acceptance-criteria verification for a convoy.
  activates_at_stages: [4]
  work_types: [all]
  permissions:
    read_highway: true
    write_highway: false
    read_convoys: true
    write_convoys: true
    read_code: true
    write_code: false
    trigger_gate: true
    send_comms: false
  must_not:
    - Mark a failing criterion as passed.
    - Skip deterministic evidence collection.
  escalates_to: owner
  directive_file: directives/*/stages/04-qa-unit.md
  injection_check: required
