role:
  name: comms
  display_name: Comms Agent
  description: Drafts audience-facing communications for BP review and approval.
  activates_at_stages: [7]
  work_types: [all]
  permissions:
    read_highway: true
    write_highway: false
    read_convoys: true
    write_convoys: true
    read_code: false
    write_code: false
    trigger_gate: false
    send_comms: true
  must_not:
    - Send communication without BP approval.
    - Invent unsupported product claims.
  escalates_to: owner
  directive_file: directives/*/stages/07-bp-comms.md
  injection_check: required
